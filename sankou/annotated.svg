<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 600 1900" width="600" height="1900">

  <!-- デザインカンプ画像 -->
  <image href="./一枚で全部のスクショ.png" x="0" y="0"
         width="600" height="1900"
         preserveAspectRatio="xMidYMin meet"/>

  <!-- 凡例 -->
  <rect x="4" y="4" width="210" height="20" rx="3" fill="#1e1e2e" opacity="0.85"/>
  <text x="8" y="18" font-family="monospace" font-size="10" fill="#89b4fa">黄=フォント確認済み  橙=フッター要素</text>

  <!-- ========================================
       セクション: お知らせ (y ~ 35%)
       ======================================== -->

  <!-- ① お知らせ 16px -->
  <circle cx="482" cy="633" r="5" fill="#FFE84D" stroke="#333" stroke-width="1"/>
  <line x1="482" y1="633" x2="340" y2="625" stroke="#FFE84D" stroke-width="1"/>
  <rect x="130" y="613" width="208" height="28" rx="3" fill="#FFE84D" opacity="0.93"/>
